<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>多媒体展示</title>
    <style>
        body { text-align: center; padding: 20px; }
        img { max-width: 100%; height: auto; margin: 20px 0; }
        .play-button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px 0;
        }
        .play-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <img src="./image.jpg" alt="图片1">
    <img src="./image2.jpg" alt="图片2">
    <br>
    <button class="play-button" onclick="playAudio()">播放音频</button>
    <audio id="myAudio">
        <source src="./non_tree.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("myAudio");
        function playAudio() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>
</body>
</html>
